<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carrabba’s Menu Quiz</title>
  <style>
    :root{
      --bg:#0b0f0e;
      --panel:#101816;
      --panel2:#0f1413;
      --text:#e7f0ed;
      --muted:#97a6a1;
      --accent:#20c997;
      --bad:#ff6b6b;
      --good:#51cf66;
      --line:#1f2b28;
      --btn:#15211e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 50% 0%, #0f1b17 0%, var(--bg) 55%, #070a09 100%);
      color:var(--text);
      padding:14px;
    }
    .wrap{max-width:980px;margin:0 auto}
    .top{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:10px 12px;margin-bottom:12px;border:1px solid var(--line);
      background: linear-gradient(180deg, #0f1715, #0b1110);
      border-radius:14px;
    }
    .brand{
      display:flex;flex-direction:column;gap:2px;
      line-height:1.1;
    }
    .brand b{font-size:15px}
    .brand span{font-size:12px;color:var(--muted)}
    .status{
      font-size:12px;color:var(--muted);
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;
    }
    .pill{
      padding:4px 8px;border:1px solid var(--line);border-radius:999px;
      background: rgba(255,255,255,0.03);
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 860px){
      .grid{grid-template-columns: 380px 1fr;}
    }
    .card{
      border:1px solid var(--line);
      border-radius:16px;
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      padding:14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }
    h2{margin:0 0 8px 0;font-size:16px}
    .muted{color:var(--muted);font-size:12px}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{
      border:1px solid var(--line);
      background: var(--btn);
      color: var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-weight:600;
      cursor:pointer;
      font-size:13px;
    }
    button.primary{border-color:#1d3f36;background:#0f2a24}
    button.danger{border-color:#4b1f24;background:#261014}
    button:disabled{opacity:.5;cursor:not-allowed}
    .qhead{
      display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      margin-bottom:10px;
    }
    .qtype{font-size:12px;color:var(--muted)}
    .prompt{
      border:1px solid var(--line);
      background: rgba(0,0,0,0.22);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
      white-space:pre-wrap;
    }
    .opts{display:grid;gap:10px}
    .opt{
      text-align:left;
      width:100%;
      padding:12px;
      border-radius:14px;
      background: rgba(255,255,255,0.03);
      border:1px solid var(--line);
      color: var(--text);
      font-weight:600;
      line-height:1.25;
    }
    .opt small{display:block;color:var(--muted);font-weight:500;margin-top:6px}
    .opt.correct{border-color: rgba(81,207,102,.55); box-shadow: 0 0 0 2px rgba(81,207,102,.15) inset;}
    .opt.wrong{border-color: rgba(255,107,107,.55); box-shadow: 0 0 0 2px rgba(255,107,107,.12) inset;}
    .footerline{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
      color:var(--muted);font-size:12px;
    }
    .review{
      margin-top:10px;
      display:grid;
      gap:10px;
    }
    .row{
      border:1px solid var(--line);
      background: rgba(0,0,0,0.18);
      border-radius:14px;
      padding:10px 12px;
    }
    .row b{display:block;margin-bottom:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <b>Carrabba’s Menu Quiz</b>
        <span>mobile • randomized • graded</span>
      </div>
      <div class="status">
        <span class="pill" id="loadedPill">Loading…</span>
        <span class="pill" id="seenPill">Seen: 0</span>
        <span class="pill" id="modePill">Mode: Ready</span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Controls</h2>
        <div class="muted">
          She’s memorizing dish names + what they are. This drills both directions.
        </div>
        <div class="btnrow">
          <button class="primary" id="start20">Start 20-Question Quiz</button>
          <button class="primary" id="start10">Practice Mode (10)</button>
          <button class="danger" id="reset">Reset History</button>
        </div>
        <div class="footerline">
          <span id="poolInfo">Pool: …</span>
          <span id="note">No prices. No pairings. No mercy.</span>
        </div>
      </div>

      <div class="card" id="stageCard">
        <div id="stage">
          <h2>Ready</h2>
          <div class="muted">Tap a button on the left to begin.</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const LS_SEEN = "kmq_seen_ids_v1";

  const $ = (id) => document.getElementById(id);

  const loadedPill = $("loadedPill");
  const seenPill = $("seenPill");
  const modePill = $("modePill");
  const poolInfo = $("poolInfo");

  const start20 = $("start20");
  const start10 = $("start10");
  const resetBtn = $("reset");
  const stage = $("stage");

  let pool = [];      // flat list of {id, section, name, description}
  let seen = new Set();  // ids already used (persisted)
  let quiz = null;

  function idFor(item){
    // stable-ish ID: section|name
    return (item.section + "|" + item.name).toLowerCase().replace(/\s+/g," ").trim();
  }

  function loadSeen(){
    try{
      const raw = localStorage.getItem(LS_SEEN);
      if(!raw) return new Set();
      const arr = JSON.parse(raw);
      return new Set(Array.isArray(arr) ? arr : []);
    }catch{
      return new Set();
    }
  }

  function saveSeen(){
    localStorage.setItem(LS_SEEN, JSON.stringify([...seen]));
    updateSeenUI();
  }

  function updateSeenUI(){
    seenPill.textContent = `Seen: ${seen.size}`;
  }

  function shuffle(a){
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function sample(arr, n){
    const copy = arr.slice();
    shuffle(copy);
    return copy.slice(0,n);
  }

  function pickNextItems(count){
    // Prefer unseen. If not enough unseen, reset automatically (but keep working).
    const unseen = pool.filter(x => !seen.has(x.id));
    let chosen = [];
    if(unseen.length >= count){
      chosen = sample(unseen, count);
    } else {
      // take all remaining unseen, then refill from full pool without duplicates in this session set
      const needed = count - unseen.length;
      const rest = pool.filter(x => !unseen.includes(x));
      chosen = unseen.concat(sample(rest, needed));
    }
    return chosen;
  }

  function renderReady(){
    modePill.textContent = "Mode: Ready";
    stage.innerHTML = `
      <h2>Ready</h2>
      <div class="muted">Tap a button on the left to begin.</div>
    `;
  }

  function startQuiz(count){
    const items = pickNextItems(count);
    quiz = {
      total: count,
      index: 0,
      correct: 0,
      items,
      results: []
    };
    modePill.textContent = `Mode: ${count}Q`;
    showQuestion();
  }

  function makeQuestion(item){
    // Randomly choose direction:
    // A) show description -> pick name
    // B) show name -> pick description
    const dir = Math.random() < 0.5 ? "DESC_TO_NAME" : "NAME_TO_DESC";

    const distractors = pool.filter(x => x.id !== item.id);
    const wrongs = sample(distractors, 3);

    if(dir === "DESC_TO_NAME"){
      const options = shuffle([item, ...wrongs]).map(x => ({
        label: x.name,
        meta: x.section,
        isCorrect: x.id === item.id
      }));
      return {
        type: "What dish is this?",
        prompt: item.description,
        options,
        correctLabel: item.name
      };
    } else {
      const options = shuffle([item, ...wrongs]).map(x => ({
        label: x.description,
        meta: x.section + " • " + x.name,
        isCorrect: x.id === item.id
      }));
      return {
        type: "What is it?",
        prompt: item.name,
        options,
        correctLabel: item.description
      };
    }
  }

  function showQuestion(){
    const item = quiz.items[quiz.index];
    const q = makeQuestion(item);

    stage.innerHTML = `
      <div class="qhead">
        <div>
          <h2>Question ${quiz.index + 1} / ${quiz.total}</h2>
          <div class="qtype">${q.type}</div>
        </div>
        <div class="muted">${item.section}</div>
      </div>

      <div class="prompt">${escapeHtml(q.prompt)}</div>

      <div class="opts">
        ${q.options.map((o, i) => `
          <button class="opt" data-idx="${i}">
            ${escapeHtml(o.label)}
            <small>${escapeHtml(o.meta)}</small>
          </button>
        `).join("")}
      </div>

      <div class="footerline">
        <span>Score: <b>${quiz.correct}</b> / ${quiz.total}</span>
        <span class="muted">Tap an answer.</span>
      </div>
    `;

    const buttons = stage.querySelectorAll(".opt");
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = Number(btn.getAttribute("data-idx"));
        gradeAnswer(item, q, idx, buttons);
      }, { once:true });
    });
  }

  function gradeAnswer(item, q, chosenIdx, buttons){
    buttons.forEach(b => b.disabled = true);

    const chosen = q.options[chosenIdx];
    const wasCorrect = !!chosen.isCorrect;

    if(wasCorrect){
      quiz.correct++;
    }

    // mark correct + wrong
    q.options.forEach((o, i) => {
      if(o.isCorrect) buttons[i].classList.add("correct");
    });
    if(!wasCorrect){
      buttons[chosenIdx].classList.add("wrong");
    }

    // persist seen
    seen.add(item.id);
    saveSeen();

    quiz.results.push({
      section: item.section,
      name: item.name,
      description: item.description,
      correct: wasCorrect
    });

    setTimeout(() => {
      quiz.index++;
      if(quiz.index >= quiz.total){
        showResults();
      } else {
        showQuestion();
      }
    }, 650);
  }

  function showResults(){
    modePill.textContent = "Mode: Results";
    const pct = Math.round((quiz.correct / quiz.total) * 100);

    stage.innerHTML = `
      <h2>Done</h2>
      <div class="muted">Score: <b>${quiz.correct}</b> / <b>${quiz.total}</b> (${pct}%)</div>

      <div class="btnrow" style="margin-top:12px">
        <button class="primary" id="againSame">Run Another ${quiz.total}</button>
        <button id="backReady">Back to Ready</button>
      </div>

      <div class="review">
        ${quiz.results.map(r => `
          <div class="row">
            <b>${r.correct ? "✅" : "❌"} ${escapeHtml(r.name)}</b>
            <div class="muted">${escapeHtml(r.section)}</div>
            <div style="margin-top:6px">${escapeHtml(r.description)}</div>
          </div>
        `).join("")}
      </div>
    `;

    $("againSame").addEventListener("click", () => startQuiz(quiz.total));
    $("backReady").addEventListener("click", () => renderReady());
  }

  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function boot(){
    // load menu.json only (no embedded fallback)
    try{
      const res = await fetch("./menu.json", { cache: "no-store" });
      if(!res.ok) throw new Error("menu.json not found");
      const data = await res.json();

      // flatten
      const flat = [];
      for(const sec of data){
        const section = sec.section || "UNKNOWN";
        const items = Array.isArray(sec.items) ? sec.items : [];
        for(const it of items){
          if(!it || !it.name || !it.description) continue;
          flat.push({
            id: idFor({ section, name: it.name }),
            section,
            name: String(it.name).trim(),
            description: String(it.description).trim()
          });
        }
      }

      pool = flat;
      seen = loadSeen();

      loadedPill.textContent = `Loaded ${pool.length} items`;
      poolInfo.textContent = `Pool: ${pool.length} items`;
      updateSeenUI();

      start20.disabled = false;
      start10.disabled = false;

      renderReady();
    }catch(err){
      loadedPill.textContent = "Load failed";
      modePill.textContent = "Mode: Error";
      stage.innerHTML = `
        <h2>Missing menu.json</h2>
        <div class="muted">
          Put <b>menu.json</b> in the same folder as <b>index.html</b>, commit, and reload.
        </div>
      `;
      start20.disabled = true;
      start10.disabled = true;
    }
  }

  start20.addEventListener("click", () => startQuiz(20));
  start10.addEventListener("click", () => startQuiz(10));
  resetBtn.addEventListener("click", () => {
    localStorage.removeItem(LS_SEEN);
    seen = new Set();
    updateSeenUI();
    renderReady();
  });

  // Disable until data loads
  start20.disabled = true;
  start10.disabled = true;

  boot();
})();
</script>
</body>
</html>
