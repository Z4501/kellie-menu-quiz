<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carrabba’s Menu Quiz</title>
  <style>
    :root{
      --bg:#060807;
      --card:#0e1411;
      --card2:#0b100e;
      --text:#e7efe9;
      --muted:#9fb2a6;
      --border:#1f2b25;
      --btn:#0f3a25;
      --btn2:#1a2a22;
      --danger:#3a1212;
      --ok:#1f5a3a;
      --warn:#5a4a1f;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --r:16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 50% -10%, rgba(43,110,70,.18), transparent 60%) , var(--bg);
      color:var(--text);
      font-family:var(--sans);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:18px 14px 40px;
    }
    .wrap{width:min(980px,100%);}
    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin:6px 0 16px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    h1{
      margin:0;
      font-size:18px;
      letter-spacing:.2px;
      font-weight:700;
    }
    .sub{
      margin:0;
      font-size:13px;
      color:var(--muted);
    }
    .pillbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
      box-shadow: var(--shadow);
    }
    .dot{
      width:8px;height:8px;border-radius:999px;
      background:#777;
      box-shadow:0 0 0 2px rgba(0,0,0,.2);
    }
    .dot.ok{background:#35c26b;}
    .dot.bad{background:#d15454;}
    main{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card .hd{
      padding:14px 14px 10px;
      border-bottom:1px solid rgba(255,255,255,.04);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .card .hd strong{font-size:14px;}
    .card .bd{padding:14px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      cursor:pointer;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 12px;
      border-radius: 12px;
      font-size:13px;
      font-weight:650;
    }
    button.primary{
      background: linear-gradient(180deg, rgba(34,170,95,.22), rgba(34,170,95,.10));
      border-color: rgba(53,194,107,.35);
    }
    button.secondary{
      background: rgba(255,255,255,.02);
    }
    button.danger{
      background: rgba(209,84,84,.10);
      border-color: rgba(209,84,84,.30);
    }
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .qbox{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .prompt{
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding:12px 12px;
      line-height:1.35;
    }
    .kicker{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      letter-spacing:.2px;
    }
    .big{
      font-size:15px;
      font-weight:700;
      margin:0;
    }
    .desc{
      margin:8px 0 0;
      font-size:14px;
      color: rgba(231,239,233,.92);
    }
    .choices{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    .choice{
      text-align:left;
      padding:12px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.06);
      line-height:1.25;
    }
    .choice small{
      display:block;
      margin-top:6px;
      color:var(--muted);
      font-weight:600;
      font-size:12px;
    }
    .choice.correct{
      background: rgba(53,194,107,.12);
      border-color: rgba(53,194,107,.35);
    }
    .choice.wrong{
      background: rgba(209,84,84,.12);
      border-color: rgba(209,84,84,.35);
    }
    .footerline{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }
    .result{
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding:12px 12px;
      line-height:1.35;
    }
    .result strong{color:var(--text)}
    .tiny{font-size:12px;color:var(--muted)}
    @media (min-width: 840px){
      main{grid-template-columns: 1fr;}
      h1{font-size:20px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>Carrabba’s Menu Quiz</h1>
        <p class="sub">20 randomized questions · multiple choice · graded</p>
      </div>
      <div class="pillbar">
        <div class="pill" title="menu.json load status">
          <span id="loadDot" class="dot bad"></span>
          <span id="loadText">Loading menu…</span>
        </div>
        <div class="pill" title="question count">
          <span>Q:</span><strong id="pillQ">0/20</strong>
        </div>
        <div class="pill" title="already seen (to avoid repeats)">
          <span>Seen:</span><strong id="pillSeen">0</strong>
        </div>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="hd">
          <strong>Controls</strong>
          <span class="tiny" id="modeText">Ready</span>
        </div>
        <div class="bd">
          <div class="row">
            <button class="primary" id="btnStart20">Start 20-Question Quiz</button>
            <button class="secondary" id="btnPractice10">Practice Mode (10)</button>
            <button class="danger" id="btnReset">Reset History</button>
          </div>
          <div class="footerline">
            <div>Tip: This avoids repeats until it runs out, then reshuffles.</div>
            <div>Works on phone storage (local).</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd">
          <strong id="panelTitle">Quiz</strong>
          <span class="tiny" id="panelMeta"></span>
        </div>
        <div class="bd">
          <div id="stage" class="qbox"></div>
        </div>
      </section>
    </main>
  </div>

<script>
(() => {
  // =========================
  // Settings
  // =========================
  const QUIZ_DEFAULT = 20;
  const PRACTICE_DEFAULT = 10;
  const CHOICES = 4;

  // Storage keys
  const LS_SEEN = "kellie_menu_seen_v1";

  // DOM
  const loadDot = document.getElementById("loadDot");
  const loadText = document.getElementById("loadText");
  const pillQ = document.getElementById("pillQ");
  const pillSeen = document.getElementById("pillSeen");
  const modeText = document.getElementById("modeText");
  const panelTitle = document.getElementById("panelTitle");
  const panelMeta = document.getElementById("panelMeta");
  const stage = document.getElementById("stage");
  const btnStart20 = document.getElementById("btnStart20");
  const btnPractice10 = document.getElementById("btnPractice10");
  const btnReset = document.getElementById("btnReset");

  // State
  let allItems = [];      // flattened items
  let pool = [];          // items not yet used (this session)
  let seenSet = new Set(); // persisted between sessions
  let session = null;     // current quiz session object

  // =========================
  // Utilities
  // =========================
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const norm = (s) => String(s ?? "").trim().replace(/\s+/g, " ");
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const shuffle = (arr) => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  };

  function loadSeen() {
    try {
      const raw = localStorage.getItem(LS_SEEN);
      if (!raw) return new Set();
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return new Set();
      return new Set(arr);
    } catch {
      return new Set();
    }
  }

  function saveSeen() {
    try {
      localStorage.setItem(LS_SEEN, JSON.stringify(Array.from(seenSet)));
    } catch {}
  }

  function setLoaded(ok, msg) {
    loadDot.classList.remove("ok","bad");
    loadDot.classList.add(ok ? "ok" : "bad");
    loadText.textContent = msg;
  }

  function updatePills() {
    pillSeen.textContent = String(seenSet.size);
    if (!session) {
      pillQ.textContent = `0/${QUIZ_DEFAULT}`;
      return;
    }
    pillQ.textContent = `${session.idx}/${session.total}`;
  }

  function flattenMenu(json) {
    const out = [];
    for (const sec of (json || [])) {
      const section = norm(sec.section);
      const items = Array.isArray(sec.items) ? sec.items : [];
      for (const it of items) {
        const name = norm(it.name);
        const description = norm(it.description);
        if (!name || !description) continue;
        const id = `${section}::${name}`.toLowerCase();
        out.push({ id, section, name, description });
      }
    }
    return out;
  }

  function refillPool() {
    // New pool = items not in seenSet; if empty, allow repeats (but still shuffle)
    const fresh = allItems.filter(x => !seenSet.has(x.id));
    pool = fresh.length ? fresh : [...allItems];
    shuffle(pool);
  }

  function nextItem() {
    if (!pool.length) refillPool();
    return pool.pop();
  }

  // =========================
  // Question generation
  // =========================
  function buildQuestion(item) {
    // Alternate styles:
    // A) Given NAME -> pick correct DESCRIPTION
    // B) Given DESCRIPTION -> pick correct NAME
    const flip = Math.random() < 0.5;

    // Build distractors (same "type" as correct target)
    const distractors = [];
    const used = new Set([item.id]);

    while (distractors.length < (CHOICES - 1) && used.size < allItems.length) {
      const cand = pick(allItems);
      if (used.has(cand.id)) continue;

      // Mild guard: avoid identical descriptions across items (rare, but possible)
      if (!flip && norm(cand.name).toLowerCase() === norm(item.name).toLowerCase()) continue;
      if (flip && norm(cand.description).toLowerCase() === norm(item.description).toLowerCase()) continue;

      used.add(cand.id);
      distractors.push(cand);
    }

    if (!flip) {
      // DESCRIPTION -> NAME
      const correct = item.name;
      const options = shuffle([correct, ...distractors.map(d => d.name)]).map(v => ({ label: v, isCorrect: v === correct }));
      return {
        type: "desc_to_name",
        item,
        promptKicker: "What dish is this?",
        promptMain: item.description,
        options
      };
    } else {
      // NAME -> DESCRIPTION
      const correct = item.description;
      const options = shuffle([correct, ...distractors.map(d => d.description)]).map(v => ({ label: v, isCorrect: v === correct }));
      return {
        type: "name_to_desc",
        item,
        promptKicker: "What is it?",
        promptMain: item.name,
        options
      };
    }
  }

  // =========================
  // UI rendering
  // =========================
  function renderReady() {
    panelTitle.textContent = "Quiz";
    panelMeta.textContent = "";
    modeText.textContent = "Ready";
    stage.innerHTML = `
      <div class="prompt">
        <div class="kicker">How it works</div>
        <p class="desc" style="margin:0">
          Tap <strong>Start</strong>. Answer 20 questions. You’ll get a score at the end.
          It avoids repeats until it runs out.
        </p>
      </div>
    `;
    updatePills();
  }

  function renderQuestion() {
    const q = session.current;
    panelTitle.textContent = "Quiz";
    panelMeta.textContent = `Section: ${q.item.section}`;
    modeText.textContent = "In progress";

    const promptHTML = `
      <div class="prompt">
        <div class="kicker">${esc(q.promptKicker)}</div>
        <p class="big">${esc(q.promptMain)}</p>
        <p class="desc"><span class="tiny">(${esc(q.item.section)})</span></p>
      </div>
    `;

    const choicesHTML = q.options.map((o, idx) => `
      <button class="choice" data-idx="${idx}">
        ${esc(o.label)}
      </button>
    `).join("");

    stage.innerHTML = `
      ${promptHTML}
      <div class="choices">${choicesHTML}</div>
      <div class="footerline">
        <div>Question <strong>${session.idx}</strong> of <strong>${session.total}</strong></div>
        <div>Correct: <strong>${session.correct}</strong> · Wrong: <strong>${session.wrong}</strong></div>
      </div>
    `;

    // Bind clicks
    stage.querySelectorAll(".choice").forEach(btn => {
      btn.addEventListener("click", () => onAnswer(Number(btn.dataset.idx)));
    });

    updatePills();
  }

  function revealAnswer(chosenIdx) {
    const q = session.current;
    const buttons = Array.from(stage.querySelectorAll(".choice"));
    buttons.forEach((b, idx) => {
      const opt = q.options[idx];
      b.disabled = true;
      if (opt.isCorrect) b.classList.add("correct");
      if (idx === chosenIdx && !opt.isCorrect) b.classList.add("wrong");
    });

    // Show “correct answer” details
    const correctOpt = q.options.find(o => o.isCorrect);
    const detail = document.createElement("div");
    detail.className = "result";
    detail.innerHTML = `
      <div class="kicker">Answer</div>
      <div><strong>${esc(q.item.name)}</strong></div>
      <div class="tiny" style="margin-top:6px">${esc(q.item.description)}</div>
    `;
    stage.appendChild(detail);
  }

  function renderFinal() {
    panelTitle.textContent = "Results";
    panelMeta.textContent = "";
    modeText.textContent = "Completed";

    const pct = session.total ? Math.round((session.correct / session.total) * 100) : 0;

    stage.innerHTML = `
      <div class="result">
        <div class="kicker">Final score</div>
        <div style="font-size:18px;font-weight:800">${pct}%</div>
        <div class="tiny" style="margin-top:6px">
          Correct: <strong>${session.correct}</strong> · Wrong: <strong>${session.wrong}</strong> · Total: <strong>${session.total}</strong>
        </div>
      </div>

      <div class="prompt">
        <div class="kicker">Next move</div>
        <p class="desc" style="margin:0">
          Run it again. Same menu. Different questions. Same chef. Less mercy.
        </p>
      </div>
    `;
    updatePills();
  }

  // =========================
  // Actions
  // =========================
  function startSession(total) {
    if (!allItems.length) return;

    session = {
      total,
      idx: 0,
      correct: 0,
      wrong: 0,
      current: null
    };

    refillPool();
    nextQuestion();
  }

  function nextQuestion() {
    if (!session) return;

    if (session.idx >= session.total) {
      renderFinal();
      return;
    }

    const item = nextItem();
    session.idx += 1;
    session.current = buildQuestion(item);

    renderQuestion();
  }

  function onAnswer(chosenIdx) {
    const q = session.current;
    const chosen = q.options[chosenIdx];
    const ok = !!chosen?.isCorrect;

    if (ok) session.correct += 1;
    else session.wrong += 1;

    // Mark as seen (persisted)
    seenSet.add(q.item.id);
    saveSeen();

    revealAnswer(chosenIdx);
    updatePills();

    // Move on after a short delay (tap-friendly)
    const nextBtn = document.createElement("button");
    nextBtn.className = "primary";
    nextBtn.style.marginTop = "12px";
    nextBtn.textContent = (session.idx >= session.total) ? "View Results" : "Next Question";
    nextBtn.addEventListener("click", () => nextQuestion());
    stage.appendChild(nextBtn);
  }

  function resetHistory() {
    seenSet = new Set();
    saveSeen();
    refillPool();
    updatePills();
    renderReady();
  }

  // =========================
  // Load menu.json
  // =========================
  async function loadMenu() {
    setLoaded(false, "Loading menu…");
    btnStart20.disabled = true;
    btnPractice10.disabled = true;

    try {
      const res = await fetch("./menu.json", { cache: "no-store" });
      if (!res.ok) throw new Error("menu.json not found");
      const json = await res.json();
      allItems = flattenMenu(json);

      if (!allItems.length) throw new Error("menu.json has no items");

      seenSet = loadSeen();
      refillPool();

      setLoaded(true, `Loaded ${allItems.length} items`);
      btnStart20.disabled = false;
      btnPractice10.disabled = false;

      updatePills();
      renderReady();
    } catch (e) {
      setLoaded(false, "menu.json missing / invalid");
      stage.innerHTML = `
        <div class="result">
          <div class="kicker">Problem</div>
          <div><strong>menu.json</strong> is missing or invalid.</div>
          <div class="tiny" style="margin-top:6px">
            Add menu.json next to index.html in the repo, commit, refresh.
          </div>
        </div>
      `;
      updatePills();
    }
  }

  // Buttons
  btnStart20.addEventListener("click", () => startSession(QUIZ_DEFAULT));
  btnPractice10.addEventListener("click", () => startSession(PRACTICE_DEFAULT));
  btnReset.addEventListener("click", resetHistory);

  // Boot
  renderReady();
  loadMenu();
})();
</script>
</body>
</html>
